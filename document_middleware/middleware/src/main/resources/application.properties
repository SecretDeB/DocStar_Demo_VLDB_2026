spring.application.name=documentms

spring.datasource.url=jdbc:mysql://localhost:3306/docstar
spring.datasource.username=root
spring.datasource.password=docstar
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=50000


spring.jpa.show-sql=true

# Making the application public
server.address=0.0.0.0
server.port=8180
server.servlet.context-path=/api/v1/

# Max file size for a single file
spring.servlet.multipart.max-file-size=1GB
# Max request size (all files combined)
spring.servlet.multipart.max-request-size=2GB